    problem: 'A single AppendItem re-reads and re-parses the README three times and writes it twice, and SyncShards regenerates the entire shard store via a full migrate. Bulk-adding N items in a loop is effectively O(N) full-store rewrites and 2N shard-directory rewrites. (Deferred: .planning/epics/deferred/18.0.1_debt-bulk-add.md — was mis-cited as "Epic Plan 18.1", an unrelated epic; corrected 2026-07-05)'
    fix: Expose a batch-append that mutates the README once, syncs shards once, and refreshes stats once for a batch; keep the single-item path for the interactive case. Verify by benchmarking a 100-item batch against 100 single adds.
