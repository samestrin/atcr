    problem: 'exec.CommandContext SIGKILLs only the direct child on timeout; a validation command that spawns subprocesses (e.g. sh -c make ...) leaves grandchildren orphaned and still running after the deadline, as cmd.WaitDelay only force-closes the parent pipe fds and does not reap the process group (Deferred: Epic Plan 22.0 process_group_reaping — TD-006/sprint-plan.md:296 was a bare TD-number reference with no backing plan; promoted to a real epic 2026-07-05)'
    fix: Set cmd.SysProcAttr Setpgid true and kill the whole group (syscall.Kill(-pid, SIGKILL)) on the cancel/timeout path (unix build-tagged) so grandchildren are reaped too
