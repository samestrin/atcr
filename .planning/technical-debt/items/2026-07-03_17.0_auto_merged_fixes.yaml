    file: internal/ghaction/client.go:451
    problem: The retry predicate in sendDo (line 451) and get (line 516) fires only on status >= 500 or == 429 with a fixed 250ms-1s exponential backoff that ignores GitHub's Retry-After / X-RateLimit-Reset headers. GitHub signals secondary rate limits with a 403 plus Retry-After; those are treated as permanent APIError and never retried, while genuine 429s are retried after 250ms instead of the server-instructed delay, which can trip GitHub abuse detection during a burst of blob/tree POSTs
    fix: Honor Retry-After (and treat a 403 carrying it as retriable) by parsing the header on the non-2xx branch and sleeping that duration instead of the fixed backoff; verify with an httptest server returning 403+Retry-After 1 then 201 asserting the client waits and succeeds
    category: performance
    est_minutes: 60
