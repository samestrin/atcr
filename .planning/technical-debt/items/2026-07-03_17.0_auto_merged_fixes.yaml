    file: internal/ghaction/client.go:343
    problem: FindOpenPullRequest issues a single GET /pulls?head=...&state=open with no per_page and no pagination then picks the lowest number from that one page. GitHub returns at most 30 results per page by default, so if more than a page of open PRs share the head the true lowest-numbered PR can sit on an unfetched page and the stable PR the orchestrator updates would be non-deterministic, weakening create-vs-update determinism
    fix: Add q.Set(per_page,100) and either follow Link rel=next pagination or document the single-page assumption on the exported signature; verify with a stub returning a paginated Link header asserting all pages are scanned
    category: maintainability
