    file: cmd/atcr/review.go:393
    problem: Audit ledger write path is cwd-relative (req.Root=".") while audit-report reads via repoRoot() walk-up, so a review launched from a subdirectory writes records the report never finds (subdir-only AC1/AC2 gap)
    fix: 'Resolve repo-level ledger writes (history AND audit) against repoRoot() uniformly, as a cross-cutting change to the review command''s Root handling (Resolved: duplicate of audit_report.go:35 — documented CWD==repo-root assumption per decision (b); full migration tracked as TD-019.)'
