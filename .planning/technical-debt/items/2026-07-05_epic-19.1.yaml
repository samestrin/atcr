    problem: The audit hook re-reads sources/pool/findings.txt that the history hook read moments earlier in the same review, so the pool file is parsed twice per review run
    fix: 'Parse the pool findings once in the CLI layer and pass the finding set to both history.RecordReview and audit.RecordReview, or expose a shared parse result (Won''t-fix: accepted — the duplicate parse mirrors internal/history''s independent capture pattern per epic design; not worth a cross-package signature refactor for a sub-ms, once-per-run gain.)'
