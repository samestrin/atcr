    problem: MarkFlagRequired only checks --pr is set not its value so `audit-report --pr 0` matches every non-PR run (PR omitted via omitempty) and renders a bogus PR-0 report of all local runs
    fix: After GetInt reject pr <= 0 with a usageError requiring a positive PR number
