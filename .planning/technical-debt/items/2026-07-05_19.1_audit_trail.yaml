    file: cmd/atcr/review.go:116
    problem: 'prNumberFromFlags only honors the explicit flag when n > 0 (line 117); an explicit --pr 0 or --pr -1 is Changed but fails the n > 0 test and falls through to prFromGitHubRef(os.Getenv("GITHUB_REF")). A user who explicitly passes --pr 0 in CI to suppress an env-derived PR gets the opposite: the GITHUB_REF value silently wins, breaking strict flag-wins-over-env precedence for the explicit-zero case.'
    fix: When cmd.Flags().Changed("pr") is true, return the explicit value (clamping negatives to 0) without consulting the env, so an explicit flag always wins. Reserve the GITHUB_REF fallback for the truly-unset case only.
