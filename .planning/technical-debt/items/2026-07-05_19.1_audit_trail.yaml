    file: cmd/atcr/audit_report.go:43
    problem: 'The audit ledger uses PR=0 as the "no PR" sentinel (record.go:25 json:"pr,omitempty"): a local review with no PR context is stored with PR=0. The audit-report command marks --pr required but MarkFlagRequired only checks the flag is present, not its value, and --pr defaults to 0. So `atcr audit-report --pr 0` passes validation and matches r.PR == 0 for every non-PR local run, emitting a bogus "Audit Report — PR #0" that aggregates unrelated runs. Two independent reviewers flagged this.'
    fix: In runAuditReport (audit_report.go:28-51) reject pr <= 0 up front with usageError("--pr must be a positive pull-request number") since 0 is reserved as the non-PR sentinel in the ledger. Verify with a test asserting `audit-report --pr 0` exits non-zero with a usage error rather than reporting local runs.
    category: correctness
    est_minutes: 15
    source: code-review
    reviewers:
