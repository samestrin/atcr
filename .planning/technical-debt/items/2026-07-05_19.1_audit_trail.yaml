    file: cmd/atcr/resume.go:152
    problem: The AllComplete resume path (re-run reconciliation and exit clean) calls recordResumeAudit on every invocation. Running `atcr review --resume latest` repeatedly against an already-complete review appends a fresh audit record each time (same base/head/PR, new timestamp), inflating the ledger. audit-report --pr N then reports N duplicate "runs" for a single logical review. Mirrors pre-existing recordResumeHistory behavior.
    fix: Skip the audit append on the AllComplete re-reconcile path (it performed no new review work), or dedupe records by review-directory id at render time so repeated re-reconciliations of one review collapse to a single audited run.
