    file: internal/audit/capture.go:70
    problem: summarize() returns a hard error when stream.ParseSource fails (e.g. a torn or tampered first line of sources/pool/findings.txt with a missing/unknown version header). RecordReview propagates it as (0, err) and both callers log-and-swallow, so NO audit record is appended for that run — contradicting the documented AC1 contract in capture.go:27-31 ("records every review run … unconditionally") and record.go:5. A compliance ledger silently drops a run precisely when the findings artifact is damaged.
    fix: 'In summarize(), treat a ParseSource error like the malformed-row and missing-file cases: emit a stderr warning and return (nil, nil) so RecordReview still appends exactly one record with an empty severity summary. Add a test: a findings.txt whose first line is not the version header still yields exactly one ledger record.'
