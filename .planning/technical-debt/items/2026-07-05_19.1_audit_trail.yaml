    file: cmd/atcr/review.go:369
    problem: The audit.RecordReview hook (review.go:393) sits AFTER the all-agents-failed guard `if err != nil { return err }` (~line 368-370), so a completed-but-all-agents-failed review returns before ever calling RecordReview, producing zero audit records. This contradicts the "every review run appends exactly one record" claim in record.go:5 and capture.go:28-31. The review directory is preserved on disk for a fully-failed run, but the compliance ledger omits it — exactly the run an auditor most wants recorded.
    fix: Either move the audit append above the all-agents-failed return guard (or add a failure-path record) so the run is stamped regardless of agent outcome, OR correct the docstrings in record.go/capture.go to state that fully-failed and interrupted runs are intentionally excluded, so the "every review run" claim stops overselling coverage.
