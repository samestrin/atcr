    file: internal/audit/render.go:36
    problem: sanitizeCell neutralizes only pipes and control chars; raw HTML (<img onerror=...>), backticks, and other markdown metacharacters in a severity label flow through untouched into the report. The report is described as a "compliance archive"; rendered in a permissive markdown viewer this is stored-injection surface. GitHub's renderer sanitizes HTML so real-world blast radius is limited, but the doc comment claims cells are "never written raw" for tamper-safety, which overstates the actual protection.
    fix: Either escape/strip <, >, and backticks as well, or downgrade the doc comment's safety claim to what is actually enforced (pipe + control-char neutralization only) so callers do not over-trust it.
