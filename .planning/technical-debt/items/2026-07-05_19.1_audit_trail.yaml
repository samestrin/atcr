    file: internal/audit/render.go:88
    problem: A finding whose severity normalizes to empty (blank/whitespace label, reachable via the tampered-ledger threat model the code explicitly defends against) is excluded from the column set by the n != "" guard at line 89, but its count is still accumulated into counts[""] at lines 124-125. Row and grand totals only sum counts[c] over columns (lines 132-136), which never contains "", so those findings are silently dropped from every total — a compliance report that undercounts. Diverges from sibling internal/history.RenderTable which maps empty severity to an UNKNOWN column.
    fix: 'Mirror history: normalize empty severity to "UNKNOWN" before counting so it becomes a real column included in totals, or fold counts[""] into an UNKNOWN bucket. Never let a counted finding fall outside the summed column set. Add a test with a blank-severity record asserting it appears in the totals.'
