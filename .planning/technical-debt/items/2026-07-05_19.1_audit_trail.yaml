    file: cmd/atcr/audit_report.go:35
    problem: The writers append CWD-relative — review.go:393 uses filepath.Join(req.Root, ...) where req.Root is hard-coded "." (review.go:280), and resume.go:227 uses filepath.Join(".", ...) — but the new audit-report reader resolves repoRoot() (git top-level absolute path). Invoking `atcr review` from a repo subdirectory writes <subdir>/.atcr/audit.log.jsonl while `atcr audit-report` reads <repo-root>/.atcr/audit.log.jsonl and reports "no audit records found" for a PR that was genuinely reviewed. Mirrors the pre-existing history-command divergence.
    fix: 'Have the review/resume writers resolve the git repo root once (as audit-report does) and write to <root>/.atcr so writer and reader agree regardless of CWD. If sub-directory invocation is formally unsupported, document that constraint explicitly; do not leave reader and writer resolving the path two different ways. (Resolved: decision (b) — documented the CWD==repo-root operating assumption in CLI --help + README Quickstart; full CWD-independence migration tracked separately as TD-019.)'
