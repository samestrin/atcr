    file: cmd/atcr/audit_report.go:50
    problem: 'The no-records case returns a plain fmt.Errorf which main.go maps to exit 1 (exitFailure), and a missing --pr relies on MarkFlagRequired whose error is also plain (exit 1). This is inconsistent with the codebase''s own convention: user-supplied input errors are usage errors (exit 2), as done in debt_add.go and github.go, and even the corrupt-ledger branch two lines up (audit_report.go:38) uses usageError (exit 2). AC3 is technically satisfied (exit 1 is non-zero) but the exit code is inconsistent with sibling commands.'
    fix: Wrap the no-records error in usageError(...) so an unknown PR is exit 2, and replace MarkFlagRequired with an explicit usageError check for the missing flag (matching debt_add.go) so required-flag violations are exit 2 too.
    category: error-handling
