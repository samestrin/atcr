    file: internal/audit/reader.go:21
    problem: Load reads the entire append-only ledger into an in-memory []Record and audit-report then linearly scans every record to select one PR (audit_report.go:41-46). The ledger has no rotation or compaction and grows one record per review run forever, so memory and per-report time grow unbounded with total historical runs. Records are tiny so this is tolerable near-term, but there is no cap or windowing.
    fix: Acceptable for now given small records; at minimum document the unbounded-growth tradeoff on Load, or add optional compaction/rotation (e.g. archive records older than N months). Verify by simulating a large ledger and confirming report latency/memory scale linearly.
    category: performance
