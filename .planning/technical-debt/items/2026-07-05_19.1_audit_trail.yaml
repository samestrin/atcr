    file: internal/audit/record.go:1
    problem: 'The package doc calls the ledger "tamper-evident," but nothing in the implementation provides tamper-evidence: no hash chain, HMAC, signature, or sequence integrity. Records are plain JSON appended with O_APPEND, and Load silently skips malformed lines, so hand-editing/truncating .atcr/audit.log.jsonl is undetectable. render.go:24-26 even states the ledger "could be tampered with" — a direct contradiction. Overstating a compliance artifact''s integrity is misleading to auditors.'
    fix: Change the wording in record.go:1-2 to "append-only" (drop "tamper-evident"), or actually implement integrity (e.g. a prev-hash chain per record verified in Load). The epic's Out-of-Scope explicitly excludes cryptographic signing, so the doc-wording fix is the intended path.
