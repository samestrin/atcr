    file: internal/astgroup/parsers/src/pyparser/main.go:112
    problem: 'scanTripleQuotes and stripComment are quote/escape-unaware. A triple-quote appearing inside a # comment, or a # appearing inside a string literal, flips the multi-line-string state machine the wrong way, so arbitrary spans of real code get classified as string content and dropped from significantLines, silently erasing blocks. The heuristic disclaimer documents the risk but does not bound it: on unusual source the structural hash diverges from the true AST. (Deferred: Epic Plan 22.3 pyparser_quote_aware_scanning — heuristic limitation already documented at pyparser/main.go:72-78 and 152-156, degrades to proximity grouping.)'
    fix: 'Run scanTripleQuotes only over the code portion (skip after an unquoted #) and skip triple-quotes occurring inside single-line strings. Add regression fixtures: a # containing a triple-quote, and a string literal containing #.'
    category: security
    est_minutes: 120
