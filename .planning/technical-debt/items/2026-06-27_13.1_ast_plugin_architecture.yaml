    file: internal/astgroup/parsers/src/goparser/main.go:39
    problem: 'The guest pins alloc''d buffers and hands the host int32(uintptr(unsafe.Pointer(&b[0]))) as a stable guest offset, valid only because the current Go GC is non-moving. This is an undocumented runtime invariant, not a language guarantee; a future moving GC makes the packed pointer a dangling offset with no detection. The unsafe alloc/free/emit/node boilerplate is copy-pasted across goparser, pyparser, and the 13.4 brace parsers, so any ABI fix must be applied N times. (Deferred: Epic Plan 22.2 astgroup_shared_guest_abi — the "revisit if parser count grows" trigger has fired (3 parsers); duplicate of braceparser/main.go:1)'
    fix: Extract the shared alloc/free/emit/pins ABI into one internal guest package imported by every parser main.go, and add a build-time note pinning the GC assumption (or switch to an explicitly reserved arena).
    category: maintainability
    est_minutes: 120
    source: code-review
