# .goreleaser.yaml — release build configuration for the atcr binary.
#
# Version stamping — DECIDED, do not re-litigate (see docs/release-process.md,
# task 01). This repo has TWO independent version variables that must be stamped
# from the SAME tag in a single build, or the CLI and the leaderboard submission
# envelope will silently disagree about which build produced a given result:
#   - github.com/samestrin/atcr/internal/version.Version -> stamped {{.Version}}
#       (v-stripped: tag v1.2.3 -> "1.2.3"). Read by the leaderboard submission
#       envelope (Epic 10.0) as atcr_version.
#   - main.version (cmd/atcr)                            -> stamped {{.Tag}}
#       (v-prefixed: tag v1.2.3 -> "v1.2.3"). Feeds atcrVersion(), printed by
#       `atcr --version` / `atcr version`, matching a `go install ...@v1.2.3` build.
# Both agree on the numeric X.Y.Z; the leading `v` is the only difference.
#
# Date stamp — intentionally OMITTED (no -X main.date). Supplying an explicit
# ldflags list simply means no build date is stamped: cmd/atcr declares no
# main.date var, so goreleaser's default `-X main.date={{.Date}}` would be a
# silent linker no-op anyway.
# NOTE: this makes the binary itself byte-reproducible (no wall-clock stamps
# and -trimpath strips build paths). Archive mtimes are pinned to the commit
# timestamp via mod_timestamp, so checksums are stable for the same tag.
version: 2

builds:
  - main: ./cmd/atcr
    binary: atcr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/samestrin/atcr/internal/version.Version={{.Version}} -X main.version={{.Tag}}
    mod_timestamp: '{{ .CommitTimestamp }}'
    # goos omitted -> goreleaser default: [darwin, linux, windows].
    # goarch would default to [386, amd64, arm64], but 386 (32-bit) is excluded
    # below: atcr's engine is not 32-bit clean —
    # internal/reconcile/disagree.go:362 uses `1<<31` (2147483648), which
    # overflows a 32-bit `int` (`cannot use 1 << 31 as int value (overflows)`).
    # Fixing that is an engine change, out of scope for the release-packaging
    # sprint, so the release matrix is amd64 + arm64 only.
    ignore:
      - goarch: "386"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    # Windows consumers expect .zip rather than .tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
