# Shared golangci-lint config (golangci-lint v2.12.2).
#
# A single repo-root config governs linting everywhere so rules cannot drift:
#   - root "Go CI" (.github/workflows/ci.yml) runs golangci-lint from the repo root
#   - the ./reconcile release gate (.github/workflows/reconcile-module.yml) runs
#     golangci-lint with working-directory: reconcile, which discovers this file by
#     walking up to the repo root — so both read the identical linter selection
#   - .githooks/pre-push runs `golangci-lint run` locally against the same config
#
# Linter selection is pinned explicitly (vet, ineffassign, staticcheck, errcheck)
# so it is identical across CI, the release gate, and local runs. The repo passes
# golangci-lint's full default set with 0 issues today; this explicit set is a
# stable, reproducible subset, not a relaxation introduced to silence findings.
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
