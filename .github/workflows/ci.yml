name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Go Lint & Test
    runs-on: [self-hosted, gauntlet]

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          # gauntlet runners are persistent dedicated hardware, not ephemeral
          # GitHub-hosted VMs -- GOCACHE/GOMODCACHE already survive between jobs
          # on local disk. actions/setup-go's cache:true instead round-trips a
          # ~2GB tarball through GitHub's network Actions Cache on every run
          # (confirmed via step logs: it re-downloads files already present
          # locally, sometimes causing 10+ min stalls when concurrent jobs
          # fight over the cache-save step).
          cache: false

      - name: Verify Formatted
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files must be formatted with gofmt. Run: go fmt ./..."
            gofmt -d .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
        with:
          # Single pinned version shared with reconcile-module.yml and the root
          # .golangci.yml so a tag cannot pass locally but fail in CI (or vice versa).
          version: v2.12.2

      - name: Run Tests
        # -race adds heavy overhead (internal/astgroup alone runs ~5x slower
        # under it) and -coverprofile disables Go's test cache, so every PR
        # push re-executes the entire suite uncached. Mirror reconcile-module.yml's
        # existing PR-time precedent: fast plain `go test` for pull_request
        # feedback, full -race + coverage gate on push (i.e. post-merge to main).
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            go test ./...
          else
            go test -v -race -coverprofile=coverage.out ./...
          fi

      - name: Upload coverage profile
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'push'
        continue-on-error: true # non-essential: a storage-quota/upload failure must not fail CI
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn
          retention-days: 7

  # PR-time coverage for the nested ./reconcile module. The `ci` job above runs
  # `go test ./...` from the repo root, which does NOT cross ./reconcile's go.mod
  # boundary — so without this dedicated job a library regression is invisible
  # until the next module-release tag. This job runs `go test` only (no -race, no
  # lint) so PR feedback stays fast; the full gofmt + golangci-lint + race gate
  # runs on tag push in reconcile-module.yml.
  reconcile-module:
    name: Reconcile Module Test
    runs-on: [self-hosted, gauntlet]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./reconcile

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          # see cache:false rationale in the `ci` job above
          cache: false

      - name: Run Module Tests
        # root `go test ./...` does NOT cross ./reconcile's go.mod boundary
        run: go test ./...

  # PR-time tests for the brace-parser scanner, which lives behind a nested go.mod
  # (internal/astgroup/parsers/src/braceparser) so root `go test ./...` never reaches
  # its parse_core.go/configs.go unit tests — leaving scanner regressions invisible
  # until they surface in the corpus. This job provisions Go 1.26 (the module's go
  # directive) and runs tests only: the embedded .wasm binaries are committed by
  # design (build.sh is not part of CI) and their integrity is already verified by
  # TestEmbeddedParsersMatchManifest, so no wasm rebuild is needed here.
  braceparser-module:
    name: Brace Parser Module Test
    runs-on: [self-hosted, gauntlet]
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ./internal/astgroup/parsers/src/braceparser

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          # see cache:false rationale in the `ci` job above
          cache: false

      - name: Run Module Tests
        run: go test ./...
